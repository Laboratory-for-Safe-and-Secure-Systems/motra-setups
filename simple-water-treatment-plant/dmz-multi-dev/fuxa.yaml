services:
  fuxa:
    image: frangoteam/fuxa:latest
    container_name: "fuxa-dash"
    hostname: "fuxa-dash"
    depends_on:
      it_server:
        condition: service_healthy
    ports:
      - "1881:1881"
    volumes:
        - ../../fuxa-demo/fuxa_appdata:/usr/src/app/FUXA/server/_appdata
        - ../../fuxa-demo/fuxa_db:/usr/src/app/FUXA/server/_db
        - ../../fuxa-demo/fuxa_logs:/usr/src/app/FUXA/server/_logs
    environment:
        - TZ=Europe/Berlin
    restart: always
  it_server:
    image: it_server
    pull_policy: build
    ports:
      - "4840:4840"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 0.0.0.0 4840 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    build: 
      context: "../../dmz-demo"
      dockerfile_inline: |
        FROM python:3.14-slim
        WORKDIR /app
        RUN apt update && apt install git ncat -y
        COPY src/requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY src/ /app/
        ENTRYPOINT ["python3"]
        CMD ["-m" , "cli.main" , "start-it-server"]